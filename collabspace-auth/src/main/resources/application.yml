server:
  port: 8081

spring:
  application:
    name: collabspace-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/collabspace_auth
    username: ${DB_USERNAME} #postgres
    password: ${DB_PASSWORD} #YashChatse
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true